<style>
  /* === Darrell Capital Management — brand palette pulled from darrellcapital.com === */
  :root {
    --blue: #4f769b;
    --blue-deep: #385166;
    --blue-darker: #2b3f52;
    --blue-soft: #8fa9c0;
    --blue-bg: #e8eef4;
    --paper: #ffffff;
    --page: #f7f7f7;
    --ink: #2a2a2a;
    --ink-body: #444444;
    --ink-soft: #505050;
    --muted: #7a7a7a;
    --rule: #dcdcdc;
    --serif: "EB Garamond", Georgia, "Times New Roman", serif;
    --sans: "Libre Franklin", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink-body);
    background: var(--page);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .site-header { background: var(--page); border-bottom: 1px solid var(--rule); padding: 22px 0; }
  .site-header .inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo { display: block; height: 56px; width: auto; max-width: 100%; }
  .brand-name { font-family: var(--serif); font-size: 24px; font-weight: 500; color: var(--blue-deep); letter-spacing: 0.5px; line-height: 1.1; }
  .brand-sub { font-family: var(--sans); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .header-nav { display: flex; gap: 26px; flex-wrap: wrap; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; }
  .header-nav a { color: #424242; text-decoration: none; padding: 4px 0; border-bottom: 1px solid transparent; transition: border-color 0.2s ease, color 0.2s ease; }
  .header-nav a:hover { color: var(--blue); border-bottom-color: var(--blue); }

  .hero { background: linear-gradient(135deg, rgba(43,63,82,0.92) 0%, rgba(56,81,102,0.90) 55%, rgba(79,118,155,0.85) 100%), linear-gradient(180deg, #2b3f52 0%, #385166 100%); color: #ffffff; padding: 110px 32px 120px; text-align: center; position: relative; overflow: hidden; }
  .hero .inner { position: relative; max-width: 920px; margin: 0 auto; }
  .hero .eyebrow { display: inline-block; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.75); padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.35); margin-bottom: 32px; font-weight: 500; }
  .hero h1 { font-family: var(--serif); font-weight: 400; font-size: clamp(40px, 5.8vw, 64px); line-height: 1.15; color: #ffffff; margin-bottom: 26px; letter-spacing: -0.3px; }
  .hero h1 em { font-style: italic; font-weight: 400; color: #d8dbe8; }
  .hero p.lede { font-size: 18px; line-height: 1.75; color: rgba(255,255,255,0.88); max-width: 720px; margin: 0 auto; font-weight: 300; }
  .hero .signature { margin-top: 40px; font-family: var(--serif); font-style: italic; font-size: 18px; color: rgba(255,255,255,0.82); }

  .intro { max-width: 880px; margin: 0 auto; padding: 90px 32px 40px; text-align: center; }
  .intro h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(28px, 3.6vw, 38px); color: var(--ink-soft); line-height: 1.3; margin-bottom: 26px; }
  .intro h2 em { color: var(--blue); font-style: italic; }
  .intro p { font-size: 17px; color: var(--ink-body); line-height: 1.85; }
  .intro p + p { margin-top: 16px; }

  .section-nav { max-width: 1100px; margin: 50px auto 0; padding: 24px 32px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 28px; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .section-nav a { font-size: 11px; letter-spacing: 2.8px; text-transform: uppercase; color: var(--blue-deep); text-decoration: none; padding: 6px 4px; border-bottom: 1px solid transparent; transition: border-color 0.2s ease, color 0.2s ease; font-weight: 500; }
  .section-nav a:hover { color: var(--blue); border-bottom-color: var(--blue); }

  main { max-width: 1180px; margin: 0 auto; padding: 60px 32px 40px; }
  .service-section { padding: 70px 0; border-bottom: 1px solid var(--rule); }
  .service-section:last-of-type { border-bottom: none; }
  .section-header { display: grid; grid-template-columns: 1fr 2.2fr; gap: 56px; align-items: start; margin-bottom: 48px; }
  .section-header .label { font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--blue); font-weight: 600; margin-bottom: 14px; }
  .section-header h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(32px, 3.8vw, 44px); color: var(--blue-deep); line-height: 1.15; letter-spacing: -0.3px; }
  .section-header .lead { font-size: 17px; line-height: 1.8; color: var(--ink-body); padding-top: 8px; }

  .subgroup { margin-bottom: 44px; }
  .subgroup:last-child { margin-bottom: 0; }
  .subgroup-title { font-family: var(--serif); font-weight: 500; font-size: 22px; color: var(--blue-deep); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--blue); display: inline-block; letter-spacing: 0.2px; }
  .service-list { columns: 2; column-gap: 52px; list-style: none; padding: 0; margin-top: 18px; }
  .service-list li { break-inside: avoid; padding: 9px 0 9px 22px; position: relative; font-size: 15px; line-height: 1.6; color: var(--ink-body); }
  .service-list li::before { content: ""; position: absolute; left: 0; top: 18px; width: 12px; height: 1px; background: var(--blue); }
  .service-list li strong { color: var(--blue-deep); font-weight: 600; }

  .pillar { background: var(--paper); border-left: 3px solid var(--blue); padding: 26px 32px; margin: 30px 0 0; font-family: var(--serif); font-style: italic; font-size: 19px; color: var(--blue-deep); line-height: 1.55; }

  .how-we-work { background: var(--blue-darker); color: #ffffff; padding: 90px 32px; margin-top: 40px; }
  .how-we-work .inner { max-width: 1100px; margin: 0 auto; }
  .how-we-work .label { font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--blue-soft); font-weight: 600; text-align: center; margin-bottom: 14px; }
  .how-we-work h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(28px, 3.4vw, 38px); text-align: center; color: #ffffff; margin-bottom: 56px; line-height: 1.25; }
  .pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 36px; }
  .pillar-card { text-align: center; }
  .pillar-card .num { font-family: var(--serif); font-size: 40px; color: var(--blue-soft); font-weight: 400; line-height: 1; margin-bottom: 14px; }
  .pillar-card h3 { font-family: var(--serif); font-weight: 500; font-size: 22px; color: #ffffff; margin-bottom: 10px; letter-spacing: 0.2px; }
  .pillar-card p { font-size: 14px; color: rgba(255,255,255,0.80); line-height: 1.7; }

  .cta { text-align: center; padding: 90px 32px; background: var(--page); }
  .cta h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(28px, 3.6vw, 38px); color: var(--blue-deep); margin-bottom: 20px; line-height: 1.3; }
  .cta p { max-width: 640px; margin: 0 auto 36px; font-size: 17px; color: var(--ink-body); line-height: 1.75; }
  .cta-buttons { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .btn { display: inline-block; padding: 15px 34px; font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 2.8px; text-transform: uppercase; text-decoration: none; transition: all 0.25s ease; border: 1px solid transparent; cursor: pointer; }
  .btn-primary { background: var(--blue); color: #ffffff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-deep); border-color: var(--blue-deep); }
  .btn-secondary { background: var(--page); color: var(--blue-deep); border-color: var(--blue-deep); }
  .btn-secondary:hover { background: var(--blue-deep); color: #ffffff; }

  footer { background: var(--blue-darker); color: rgba(255,255,255,0.75); padding: 52px 32px 28px; font-size: 13px; line-height: 1.8; }
  footer .inner { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 44px; padding-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.10); }
  footer h4 { font-family: var(--serif); font-size: 18px; font-weight: 500; color: #ffffff; margin-bottom: 12px; letter-spacing: 0.3px; }
  footer a { color: rgba(255,255,255,0.78); text-decoration: none; }
  footer a:hover { color: var(--blue-soft); }
  .legal { max-width: 1180px; margin: 22px auto 0; font-size: 11px; color: rgba(255,255,255,0.50); letter-spacing: 0.2px; line-height: 1.65; }

  @media (max-width: 900px) {
    .section-header { grid-template-columns: 1fr; gap: 16px; }
    .service-list { columns: 1; }
    .pillars { grid-template-columns: repeat(2, 1fr); gap: 36px 20px; }
    footer .inner { grid-template-columns: 1fr; gap: 28px; }
    .hero { padding: 80px 24px 90px; }
    .intro { padding: 70px 24px 30px; }
    .site-header .inner { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 560px) {
    .pillars { grid-template-columns: 1fr; }
    .cta-buttons { flex-direction: column; align-items: stretch; }
    .btn { text-align: center; }
    .header-nav { gap: 14px 20px; font-size: 11px; }
  }

  @media print {
    .site-header, .hero, .cta, .how-we-work, footer, .section-nav { page-break-inside: avoid; }
    body { background: #fff; }
    .hero, .how-we-work { background: #fff; color: #000; }
    .hero h1, .hero .eyebrow, .hero p.lede, .hero .signature,
    .how-we-work h2, .pillar-card h3, .pillar-card p, .pillar-card .num,
    .how-we-work .label { color: #000; }
    .service-list { columns: 2; }
  }
</style>
